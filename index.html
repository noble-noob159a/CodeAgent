<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rotating Donut</title>
<style>
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; background: #000; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let width, height;
  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  window.addEventListener('resize', resize);
  resize();

  // Donut parameters
  const R1 = 70; // Major radius
  const R2 = 20; // Minor radius
  const K2 = 200; // Distance between viewer and donut
  let A = 0; // Rotation angle around X axis
  let B = 0; // Rotation angle around Z axis

  // Compute K1 based on screen size
  let K1 = width * K2 * 3 / (8 * (R1 + R2));

  function render() {
    ctx.clearRect(0, 0, width, height);

    const cosA = Math.cos(A), sinA = Math.sin(A);
    const cosB = Math.cos(B), sinB = Math.sin(B);

    for (let theta = 0; theta < 2 * Math.PI; theta += 0.07) {
      const cosTheta = Math.cos(theta), sinTheta = Math.sin(theta);

      for (let phi = 0; phi < 2 * Math.PI; phi += 0.02) {
        const cosPhi = Math.cos(phi), sinPhi = Math.sin(phi);

        // Coordinates of the donut surface before rotation
        const circleX = R2 * cosTheta + R1;
        const circleY = R2 * sinTheta;

        // 3D coordinates after rotation
        const x = circleX * (cosB * cosPhi + sinA * sinB * sinPhi) - circleY * cosA * sinB;
        const y = circleX * (sinB * cosPhi - sinA * cosB * sinPhi) + circleY * cosA * cosB;
        const z = K2 + cosA * circleX * sinPhi + circleY * sinA;

        const ooz = 1 / z; // "one over z"

        // Project to 2D screen coordinates
        const xp = width / 2 + K1 * ooz * x;
        const yp = height / 2 - K1 * ooz * y;

        // Illumination (simple lambertian reflection)
        const L = cosPhi * cosTheta * sinB - cosA * cosTheta * sinPhi - sinA * sinTheta + cosB * (cosA * sinTheta - cosTheta * sinA * sinPhi);

        if (L > 0) {
          const lum = Math.min(1, L);
          const shade = Math.floor(lum * 255);
          ctx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;
          ctx.fillRect(xp, yp, 2, 2);
        }
      }
    }

    A += 0.07;
    B += 0.03;

    requestAnimationFrame(render);
  }

  render();
</script>
</body>
</html>
